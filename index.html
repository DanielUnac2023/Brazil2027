<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta de Ahorros - Brazil2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #2ecc71;
            --background: #111827;
            --card: #1f2937;
            --text: #f3f4f6;
            --muted: #9ca3af;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--background);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: var(--card);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 480px;
            text-align: center;
        }

        h1 { margin: 0 0 5px 0; font-size: 28px; color: #fff; }
        .meta-text { color: var(--muted); margin-bottom: 25px; font-size: 15px; }
        .meta-text span { color: var(--primary); font-weight: bold; }

        .monto-actual {
            font-size: 48px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 15px;
        }

        .progress-container {
            background-color: #374151;
            border-radius: 20px;
            height: 24px;
            width: 100%;
            overflow: hidden;
            margin-bottom: 12px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        .progress-bar {
            background: linear-gradient(90deg, #2ecc71, #27ae60);
            height: 100%;
            width: 0%;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .porcentaje {
            font-weight: 600;
            margin-bottom: 30px;
            color: #e5e7eb;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #111827;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input {
            background-color: #1f2937;
            border: 2px solid #374151;
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            width: 100%;
        }

        input:focus { border-color: var(--primary); }
        input#monto { flex: 2; }
        input#nombre { flex: 3; }

        button {
            background-color: var(--primary);
            color: #111827;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover { background-color: #27ae60; transform: translateY(-1px); }

        .historial {
            text-align: left;
            border-top: 1px solid #374151;
            padding-top: 20px;
            max-height: 200px;
            overflow-y: auto;
        }

        .historial h3 { margin: 0 0 10px 0; font-size: 16px; color: #fff; }
        .historial-item {
            display: flex;
            justify-content: space-between;
            background: #27303f;
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 6px;
            font-size: 14px;
        }
        .historial-item .user { font-weight: bold; color: #9ca3af; }
        .historial-item .val { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Project Brazil 2026 ✈️</h1>
        <div class="meta-text">Meta Total: <span id="meta-valor">$3000</span></div>

        <div class="monto-actual" id="monto-actual">$0.00</div>
        
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="porcentaje" id="porcentaje-texto">0% alcanzado</div>

        <form id="ahorro-form">
            <div class="input-group">
                <input type="text" id="nombre" placeholder="Tu nombre" required>
                <input type="number" id="monto" placeholder="Monto" required min="0.01" step="0.01">
            </div>
            <button type="submit">Registrar Ahorro</button>
        </form>

        <div class="historial">
            <h3>Últimos movimientos</h3>
            <div id="lista-ahorros"></div>
        </div>
    </div>

    <script>
        // 1. CONFIGURACIÓN GENERAL
        const META = 3000; // <- Cambia aquí tu meta numérica si lo deseas

        // 2. CREDENCIALES DE SUPABASE (Reemplaza con tus datos reales)
        const SUPABASE_URL = "https://hmvhjolgoyxwkeywpead.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_XJbyYZeO4egjxCPPcdF_Bg_Tmm3QcKf";

        // Inicializar cliente Supabase
        const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Elementos del DOM
        const montoActualEl = document.getElementById('monto-actual');
        const progressBarEl = document.getElementById('progress-bar');
        const porcentajeTextoEl = document.getElementById('porcentaje-texto');
        const listaAhorrosEl = document.getElementById('lista-ahorros');
        const formularioEl = document.getElementById('ahorro-form');

        // Función para consultar datos de Supabase y pintar la interfaz
        async function cargarDatos() {
            // A. Traer todos los registros de la tabla 'ahorros' ordenados por fecha reciente
            const { data: ahorros, error } = await supabase
                .from('ahorros')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error("Error cargando datos:", error);
                return;
            }

            // B. Calcular la suma total acumulada
            const totalAhorrado = ahorros.reduce((suma, item) => suma + item.monto, 0);

            // C. Actualizar interfaz visual de la barra
            montoActualEl.textContent = `$${totalAhorrado.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
            let porcentaje = (totalAhorrado / META) * 100;
            if (porcentaje > 100) porcentaje = 100;
            progressBarEl.style.width = `${porcentaje}%`;
            porcentajeTextoEl.textContent = `${porcentaje.toFixed(1)}% alcanzado`;

            // D. Pintar la lista de historial
            listaAhorrosEl.innerHTML = '';
            ahorros.forEach(item => {
                const div = document.createElement('div');
                div.className = 'historial-item';
                div.innerHTML = `<span class="user">${item.nombre}</span><span class="val">+$${item.monto}</span>`;
                listaAhorrosEl.appendChild(div);
            });
        }

        // Evento al enviar formulario (Agregar nuevo ahorro)
        formularioEl.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nombre = document.getElementById('nombre').value;
            const monto = parseFloat(document.getElementById('monto').value);

            // Insertar datos en la tabla 'ahorros' de Supabase
            const { error } = await supabase
                .from('ahorros')
                .insert([{ nombre: nombre, monto: monto }]);

            if (error) {
                alert("Error al guardar el ahorro: " + error.message);
            } else {
                document.getElementById('monto').value = ''; // Limpiar campo monto
                cargarDatos(); // Recargar la app para ver el cambio reflejado
            }
        });

        // Cargar datos por primera vez al abrir la app
        document.getElementById('meta-valor').textContent = `$${META}`;
        cargarDatos();
    </script>
</body>
</html>
